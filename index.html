<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disaster Management OB Entry</title>

<style>

body{
font-family:Arial,sans-serif;
padding:10px;
background:#f4f4f4;
margin:0;
}

h2{
text-align:center;
font-size:1.8em;
margin-bottom:10px;
}

select,input{
width:100%;
padding:12px;
margin-top:8px;
font-size:1em;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

input:disabled,select:disabled{
background-color:#e0e0e0;
}

button{
width:60px;
height:60px;
border-radius:50%;
border:none;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

button.whatsapp{background:#25D366;}
button.clear{background:#ff4d4d;color:white;}
button.export{background:#007bff;color:white;}

.whatsappContainer{
display:flex;
justify-content:center;
margin-top:10px;
}

.buttonRow{
display:flex;
justify-content:center;
gap:120px;
margin-top:20px;
}

.summary{
margin-top:20px;
background:white;
padding:10px;
border-radius:10px;
max-height:250px;
overflow-y:auto;
}

.summary h3{
margin-top:0;
font-size:1.2em;
}

.summary div{
margin-top:5px;
font-size:0.95em;
word-wrap:break-word;
}

.livePreview{
font-style:italic;
color:#555;
}

</style>
</head>

<body>

<h2>Disaster Management OB Entry</h2>

<label>Vehicle</label>
<select id="vehicle">
<option value="">Select Vehicle</option>
<option>DX28</option>
<option>DX58</option>
<option>DX107</option>
<option>DX114</option>
</select>

<label>Type of Call</label>
<select id="callType">
<option value="">Select Type</option>
<option>TRAUMA CALL</option>
<option>MEDICAL</option>
<option>FIRECALL</option>
<option>SPECIAL SERVICE</option>
<option>E-FUEL</option>
<option>OUTDUTY</option>
<option>AREA PATROL</option>
<option>RETURN TO STATION</option>
</select>

<label>Type of Incident</label>
<select id="incident" disabled>
<option value="">Select Incident</option>
</select>

<label>Area</label>
<input type="text" id="area" placeholder="Enter Area">

<label>KM</label>
<input type="number" id="km" placeholder="Enter KM">

<div class="whatsappContainer">
<button class="whatsapp" onclick="shareToWhatsApp()">W</button>
</div>

<div class="summary">
<h3>Summary</h3>
<div id="summaryList"></div>

<div class="buttonRow">
<button class="clear" onclick="clearSummary()">C</button>
<button class="export" onclick="exportSummary()">E</button>
</div>
</div>

<script>

let summaryData=JSON.parse(localStorage.getItem("callSummary"))||[];

const incidents={
"TRAUMA CALL":["ASSAULT","GSW","MBA","MVA","NEAR DROWNING","PVA","BURNS PATIENT","SMOKE INHALATION"],
"MEDICAL":["PERSON COLLAPSE","CPR in progress"],
"FIRECALL":["Vegetation alight","House alight","Wood & Iron structures alight"]
};

function getTimestamp(){
const now=new Date();
return now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
}

function isAreaDisabled(callType){
return["RETURN TO STATION","OUTDUTY","E-FUEL","AREA PATROL"].includes(callType);
}

function formatEntry(vehicle,callType,incident,area,km){

if(callType==="E-FUEL"){
return `${getTimestamp()} - ${vehicle}: Mobile E-Fuel on ${km}km`;
}

if(callType==="OUTDUTY"){
return `${getTimestamp()} - ${vehicle}: Mobile Outduty on ${km}km`;
}

if(callType==="AREA PATROL"){
return `${getTimestamp()} - ${vehicle}: Mobile Area Patrol on ${km}km`;
}

if(callType==="RETURN TO STATION"){
return `${getTimestamp()} - ${vehicle}: Return to station on ${km}km`;
}

/* AREA DISPLAY */
const areaText = area && area.trim() !== "" ? `${area} ` : "";

if(["TRAUMA CALL","MEDICAL","FIRECALL"].includes(callType)){
return `${getTimestamp()} - ${callType}: ${vehicle} mobile ${incident} ${areaText}on ${km}km`;
}

return `${getTimestamp()} - ${callType}: ${vehicle} mobile ${areaText}on ${km}km`;
}

function updateSummaryDisplay(){

const summaryDiv=document.getElementById("summaryList");
summaryDiv.innerHTML="";

summaryData.forEach(item=>{
const div=document.createElement("div");
div.textContent=item;
summaryDiv.appendChild(div);
});

}

function logEntry(){

const vehicle=document.getElementById("vehicle").value;
const callType=document.getElementById("callType").value;
const incident=document.getElementById("incident").value;
const area=document.getElementById("area").value;
const km=document.getElementById("km").value;

if(!vehicle||!callType||!km) return null;

if(["TRAUMA CALL","MEDICAL","FIRECALL"].includes(callType)&&!incident){
return null;
}

const entry=formatEntry(vehicle,callType,incident,area,km);

summaryData.push(entry);
localStorage.setItem("callSummary",JSON.stringify(summaryData));

document.getElementById("vehicle").value="";
document.getElementById("callType").value="";
document.getElementById("incident").innerHTML='<option value="">Select Incident</option>';
document.getElementById("incident").disabled=true;
document.getElementById("area").value="";
document.getElementById("km").value="";

updateSummaryDisplay();

return entry;
}

function shareToWhatsApp(){

let entry=logEntry();

if(!entry&&summaryData.length>0){
entry=summaryData[summaryData.length-1];
}

if(!entry){
alert("Please complete all required fields.");
return;
}

window.open("https://wa.me/?text="+encodeURIComponent(entry));
}

function clearSummary(){
if(confirm("Are you sure?")){
summaryData=[];
localStorage.setItem("callSummary",JSON.stringify(summaryData));
updateSummaryDisplay();
}
}

function exportSummary(){
if(summaryData.length===0){
alert("No calls to export.");
return;
}

const header=`SHIFT OB ENTRIES\n${new Date().toLocaleDateString()}\n\n`;
window.open("https://wa.me/?text="+encodeURIComponent(header+summaryData.join("\n")));
}

/* KM AUTO LOG */
const kmField=document.getElementById("km");

function autoLogKM(){
if(!kmField.value) return;
logEntry();
}

kmField.addEventListener("keydown",function(e){
if(e.key==="Enter"){
e.preventDefault();
autoLogKM();
}
});

kmField.addEventListener("blur",autoLogKM);

/* CALL TYPE HANDLER */
document.getElementById('callType').addEventListener('change',function(){

const callType=this.value;
const incidentSelect=document.getElementById("incident");
const areaField=document.getElementById("area");

/* RESET INCIDENT */
incidentSelect.innerHTML='<option value="">Select Incident</option>';

if(incidents[callType]){
incidentSelect.disabled=false;
incidents[callType].forEach(i=>{
const opt=document.createElement("option");
opt.textContent=i;
incidentSelect.appendChild(opt);
});
}else{
incidentSelect.disabled=true;
}

/* AREA LOCK FIX */
const lockArea = ["RETURN TO STATION","OUTDUTY","E-FUEL","AREA PATROL"].includes(callType);

if(lockArea){
areaField.value="";
areaField.disabled=true;
areaField.style.backgroundColor="#e0e0e0";
}else{
areaField.disabled=false;
areaField.style.backgroundColor="white";
}

updateSummaryDisplay();
});

updateSummaryDisplay();

</script>

</body>
</html>
