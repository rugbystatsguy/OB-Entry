<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disaster Management OB Entry</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
padding:12px;
}

/* HEADER */
h2{
text-align:center;
margin:10px 0 15px;
font-size:1.6em;
}

/* CARD STYLE */
.card{
background:#fff;
border-radius:12px;
padding:12px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* INPUTS */
label{
font-size:0.9em;
margin-top:8px;
display:block;
}

select,input{
width:100%;
padding:10px;
margin-top:5px;
font-size:1em;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

input:disabled,select:disabled{
background:#e0e0e0;
}

/* WHATSAPP BUTTON */
.whatsappContainer{
display:flex;
justify-content:center;
padding:10px 0;
}

button.whatsapp{
width:70px;
height:70px;
border-radius:50%;
border:none;
background:#25D366;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

button svg{
width:28px;
height:28px;
}

/* SUMMARY */
.summaryBox{
max-height:220px;
overflow-y:auto;
padding:5px;
}

.summaryItem{
font-size:0.95em;
padding:6px 0;
border-bottom:1px solid #eee;
}

/* BUTTON ROW */
.buttonRow{
display:flex;
justify-content:space-between;
gap:10px;
margin-top:10px;
}

button.action{
flex:1;
height:50px;
border:none;
border-radius:10px;
color:#fff;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.clear{background:#ff4d4d;}
.export{background:#007bff;}

</style>
</head>

<body>

<h2>Disaster Management OB Entry</h2>

<!-- INPUT CARD -->
<div class="card">

<label>Vehicle</label>
<select id="vehicle">
<option value="">Select Vehicle</option>
<option>DX28</option>
<option>DX58</option>
<option>DX107</option>
<option>DX114</option>
</select>

<label>Type of Call</label>
<select id="callType">
<option value="">Select Type</option>
<option>TRAUMA CALL</option>
<option>MEDICAL</option>
<option>FIRECALL</option>
<option>SPECIAL SERVICE</option>
<option>E-FUEL</option>
<option>OUTDUTY</option>
<option>AREA PATROL</option>
<option>RETURN TO STATION</option>
</select>

<label>Type of Incident</label>
<select id="incident" disabled>
<option value="">Select Incident</option>
</select>

<label>Area</label>
<input type="text" id="area" placeholder="Enter Area">

<label>KM</label>
<input type="number" id="km" placeholder="Enter KM">

</div>

<!-- WHATSAPP -->
<div class="card">
<div class="whatsappContainer">

<button class="whatsapp" onclick="shareToWhatsApp()">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="white">
<path d="M16 2.67c-7.36 0-13.33 5.97-13.33 13.33 0 2.64.77 5.11 2.09 7.18L4 28l5.01-1.31c2.01 1.1 4.31 1.73 6.99 1.73 7.36 0 13.33-5.97 13.33-13.33S23.36 2.67 16 2.67zm0 24.53c-2.35 0-4.53-.62-6.43-1.7l-.46-.27-2.97.78.79-2.9-.3-.47a11.2 11.2 0 0 1-1.71-5.94c0-6.19 5.03-11.22 11.22-11.22s11.22 5.03 11.22 11.22S22.19 27.2 16 27.2z"/>
</svg>

</button>

</div>
</div>

<!-- SUMMARY -->
<div class="card">

<h3 style="margin:0 0 10px;">Summary</h3>

<div id="summaryList" class="summaryBox"></div>

<div class="buttonRow">

<button class="action clear" onclick="clearSummary()">Clear</button>
<button class="action export" onclick="exportSummary()">Export</button>

</div>
</div>

<script>

let summaryData=JSON.parse(localStorage.getItem("callSummary"))||[];

const incidents={
"TRAUMA CALL":["ASSAULT","GSW","MBA","MVA","NEAR DROWNING","PVA","STABBING","BURNS PATIENT","SMOKE INHALATION"],
"MEDICAL":["PERSON COLLAPSE","CPR in progress"],
"FIRECALL":["Vegetation alight","House alight","Wood & Iron structures alight"]
};

function getTimestamp(){
const now=new Date();
return now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
}

function isAreaLocked(callType){
return["RETURN TO STATION","OUTDUTY","E-FUEL","AREA PATROL"].includes(callType);
}

function formatEntry(vehicle,callType,incident,area,km){

if(callType==="E-FUEL"){
return `${getTimestamp()} - ${vehicle}: Mobile E-Fuel on ${km}km`;
}

if(callType==="OUTDUTY"){
return `${getTimestamp()} - ${vehicle}: Mobile Outduty on ${km}km`;
}

if(callType==="AREA PATROL"){
return `${getTimestamp()} - ${vehicle}: Mobile Area Patrol on ${km}km`;
}

if(callType==="RETURN TO STATION"){
return `${getTimestamp()} - ${vehicle}: Return to station on ${km}km`;
}

const areaText = area && area.trim() !== "" ? `${area} ` : "";

if(["TRAUMA CALL","MEDICAL","FIRECALL"].includes(callType)){
return `${getTimestamp()} - ${callType}: ${vehicle} mobile ${incident} ${areaText}on ${km}km`;
}

return `${getTimestamp()} - ${callType}: ${vehicle} mobile ${areaText}on ${km}km`;
}

function updateSummaryDisplay(){

const summaryDiv=document.getElementById("summaryList");
summaryDiv.innerHTML="";

summaryData.forEach(item=>{
const div=document.createElement("div");
div.className="summaryItem";
div.textContent=item;
summaryDiv.appendChild(div);
});

}

function logEntry(){

const vehicle=document.getElementById("vehicle").value;
const callType=document.getElementById("callType").value;
const incident=document.getElementById("incident").value;
const area=document.getElementById("area").value;
const km=document.getElementById("km").value;

if(!vehicle||!callType||!km) return null;

if(["TRAUMA CALL","MEDICAL","FIRECALL"].includes(callType)&&!incident){
return null;
}

const entry=formatEntry(vehicle,callType,incident,area,km);

summaryData.push(entry);
localStorage.setItem("callSummary",JSON.stringify(summaryData));

document.getElementById("vehicle").value="";
document.getElementById("callType").value="";
document.getElementById("incident").innerHTML='<option value="">Select Incident</option>';
document.getElementById("incident").disabled=true;
document.getElementById("area").value="";
document.getElementById("km").value="";

updateSummaryDisplay();

return entry;
}

/* WHATSAPP (NO TIME REMOVAL NEEDED HERE ANYMORE IF YOU KEEP FORMAT SAME) */
function shareToWhatsApp(){

let entry=logEntry();

if(!entry&&summaryData.length>0){
entry=summaryData[summaryData.length-1];
}

if(!entry){
alert("Please complete all required fields.");
return;
}

entry = entry.replace(/^\d{2}:\d{2}\s-\s/, "");

window.open("https://wa.me/?text="+encodeURIComponent(entry));
}

function clearSummary(){
if(confirm("Are you sure?")){
summaryData=[];
localStorage.setItem("callSummary",JSON.stringify(summaryData));
updateSummaryDisplay();
}
}

function exportSummary(){
if(summaryData.length===0){
alert("No calls to export.");
return;
}

const header=`SHIFT OB ENTRIES\n${new Date().toLocaleDateString()}\n\n`;
window.open("https://wa.me/?text="+encodeURIComponent(header+summaryData.join("\n")));
}

/* INIT */
updateSummaryDisplay();

</script>

</body>
</html>
